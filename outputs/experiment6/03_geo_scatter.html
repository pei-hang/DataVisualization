      color: #1f2937;
    }

      max-width: 1460px;
      margin: 0 auto;

    }

      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      grid-column: span 12;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(148, 163, 184, 0.16);
      padding: 10px;
    }
    .card.half {
      grid-column: span 6;
    }
    .chart-box {
      width: 100%;
    }
    @media (max-width: 960px) {
      .card.half {
        grid-column: span 12;

    }
